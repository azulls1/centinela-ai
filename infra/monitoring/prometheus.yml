global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'vision-api'
    static_configs:
      - targets: ['vision-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'stream-gateway'
    static_configs:
      - targets: ['vision-stream-gateway:8081']
    metrics_path: '/health'
    scrape_interval: 30s
